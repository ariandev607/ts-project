<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>مدیریت کتابخانه</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .modal-header .btn-close {
            margin-right: auto;
            margin-left: 0;
        }
    </style>
</head>

<body>

<!-- ================== Modal Add ================== -->

<div class="modal fade" id="staticBackdrop" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">اضافه کردن کتاب</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <form id="addBookForm">

                <div class="modal-body">

                    <label class="form-label">نام کتاب</label>
                    <input type="text" id="bookname" name="bookname" class="form-control">

                    <br>

                    <label class="form-label">تعداد صفحه</label>
                    <input type="number" id="bookpage" name="bookpage" class="form-control">

                    <br>

                    <label class="form-label">سال چاپ</label>
                    <input type="number" id="bookyear" name="bookyear" class="form-control">

                </div>

                <div class="modal-footer justify-content-center">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">بستن</button>
                    <button class="btn btn-success" type="submit">ثبت</button>
                </div>

            </form>

        </div>
    </div>
</div>

<!-- ================== Modal Edit ================== -->

<div class="modal fade" id="model_edit" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">ویرایش کتاب</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <form id="editBookForm">

                <input type="hidden" id="edit_id" name="id">

                <div class="modal-body">

                    <label class="form-label">نام کتاب</label>
                    <input type="text" id="edit_bookname" class="form-control" name="edit_bookname">

                    <br>

                    <label class="form-label">تعداد صفحه</label>
                    <input type="number" id="edit_bookpage" class="form-control" name="edit_bookpage">

                    <br>

                    <label class="form-label">سال چاپ</label>
                    <input type="number"
                        id="edit_bookyear"
                        name="edit_bookyear"
                        class="form-control">

                </div>

                <div class="modal-footer justify-content-center">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">بستن</button>
                    <button class="btn btn-primary" type="submit">ویرایش</button>
                </div>

            </form>

        </div>
    </div>
</div>

<!-- ================== Users ================== -->

<div class="container mt-5">

    <h4>لیست کاربران</h4>

    <table class="table table-bordered table-striped text-center">

        <thead>
            <tr>
                <th>ردیف</th>
                <th>نام کاربر</th>
                <th>نام و نام خانوادگی</th>
                <th>موبایل</th>
            </tr>
        </thead>

        <tbody id="user_table">

        </tbody>

    </table>

</div>

<!-- ================== Books ================== -->

<div class="container mt-5">

    <h4>لیست کتاب‌ها</h4>

    <table class="table table-bordered table-striped text-center">

        <thead>
            <tr>
                <th>ردیف</th>
                <th>نام کتاب</th>
                <th>تعداد صفحه</th>
                <th>سال چاپ</th>
                <th>مدیریت</th>
            </tr>
        </thead>

        <tbody id="book_table">

        </tbody>

    </table>

    <div class="text-center">

        <button class="btn btn-success"
                style="width:450px"
                data-bs-toggle="modal"
                data-bs-target="#staticBackdrop">

            اضافه کردن

        </button>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- فایل جاوااسکریپت خودت -->
<script src="j2.js"></script>

</body>
</html>
